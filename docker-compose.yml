services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mecorion_music
      POSTGRES_USER: mecorion
      POSTGRES_PASSWORD: mecorion
    ports:
      - "5432:5432"
    volumes:
      - mecorion_music_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mecorion -d mecorion_music"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mecorion_music_postgres:
